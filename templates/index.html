<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia | Real Estate Lead Management</title>
    <!-- Modern Fonts matching the Arcadia Aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>

<body>

    <!-- Notification Toast (Gold Bordered Alert for Conflicts) -->
    <div id="toast-container" class="toast-container hidden">
        <div class="toast-content">
            <svg class="toast-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z">
                </path>
                <line x1="12" y1="9" x2="12" y2="13"></line>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
            <p id="toast-message">Conflict: This lead was already registered by [Agent Name] on [Date].</p>
        </div>
        <button id="toast-close">&times;</button>
    </div>

    <!-- Background Pattern / Image Representation -->
    <div class="background-wrapper"></div>

    <div class="app-container">
        <!-- Sidebar / Navigation -->
        <aside class="sidebar glass-panel">
            <h1 class="brand-title">Arcadia</h1>
            <p class="brand-subtitle">Lead Management</p>

            <nav class="nav-menu">
                <button class="nav-item active" data-view="dashboard">Dashboard</button>
                <button class="nav-item action-btn" data-view="new-lead">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Report Lead
                </button>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">

            <!-- Dashboard View -->
            <section id="view-dashboard" class="view-section active">
                <div class="header-flex">
                    <h2 class="view-title">Recent Leads</h2>
                    <button class="refresh-btn" onclick="fetchLeads()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                    </button>
                </div>

                <div class="dashboard-grid" id="leads-container">
                    <!-- Leads will be injected here via JS -->
                    <div class="glass-card skeleton-card"></div>
                    <div class="glass-card skeleton-card"></div>
                    <div class="glass-card skeleton-card"></div>
                </div>
            </section>

            <!-- New Lead Form View -->
            <section id="view-new-lead" class="view-section hidden">
                <h2 class="view-title">Report New Lead</h2>
                <div class="form-container glass-panel">
                    <form id="lead-form">
                        <div class="input-group">
                            <label for="full_name">Client Full Name *</label>
                            <input type="text" id="full_name" required placeholder="Alexander Wright">
                        </div>

                        <div class="input-group-row">
                            <div class="input-group">
                                <label for="report_date">Report Date</label>
                                <input type="text" id="report_date" disabled value="Auto-populated">
                            </div>
                            <div class="input-group">
                                <label for="reported_by">Agent Name *</label>
                                <input type="text" id="reported_by" required placeholder="Jane Doe">
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="comments">Notes / Comments</label>
                            <textarea id="comments" rows="3"
                                placeholder="Interested in the penthouse suites..."></textarea>
                        </div>

                        <button type="submit" class="submit-btn" id="submit-btn">
                            <span>Register Lead</span>
                            <div class="spinner hidden" id="submit-spinner"></div>
                        </button>
                    </form>
                </div>
            </section>

        </main>
    </div>

    <!-- Template for Lead Card -->
    <template id="lead-card-template">
        <div class="glass-card lead-card">
            <div class="card-header">
                <h3 class="lead-name"></h3>
                <span class="status-badge"></span>
            </div>
            <div class="card-body">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <span class="lead-phone" style="display:none;"></span>
                <span class="lead-date"></span>
                <div class="info-row">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <span class="lead-date"></span>
                </div>
                <div class="info-row">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span class="lead-agent"></span>
                </div>
                <p class="lead-comments"></p>
            </div>
            <div class="card-footer">
                <select class="status-updater">
                    <option value="New Registration">New Registration</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Schedule Showing">Schedule Showing</option>
                    <option value="Sold">Sold</option>
                    <option value="Lost">Lost</option>
                </select>
            </div>
        </div>
    </template>

    <script src="/static/js/app.js"></script>
</body>

</html>
