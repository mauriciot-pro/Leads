<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia | Real Estate Lead Management</title>
    <!-- Modern Fonts matching the Arcadia Aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&family=Space+Grotesk:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css?v=3">
</head>

<body>

    <!-- Notification Toast (Gold Bordered Alert for Conflicts) -->
    <div id="toast-container" class="toast-container hidden">
        <div class="toast-content">
            <svg class="toast-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z">
                </path>
                <line x1="12" y1="9" x2="12" y2="13"></line>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
            <p id="toast-message">Conflict: This lead was already registered by [Agent Name] on [Date].</p>
        </div>
        <button id="toast-close">&times;</button>
    </div>

    <!-- Background Pattern / Image Representation -->
    <div class="background-wrapper"></div>

    <div class="app-container">
        <!-- Sidebar / Navigation -->
        <aside class="sidebar glass-panel">
            <img src="/static/images/logo.png" alt="Arcadia Logo" class="brand-logo">
            <p class="brand-subtitle">Lead Management</p>

            <nav class="nav-menu">
                <button class="nav-item active" data-view="dashboard">Overview</button>
                <button class="nav-item" data-view="all-leads">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="8" y1="6" x2="21" y2="6"></line>
                        <line x1="8" y1="12" x2="21" y2="12"></line>
                        <line x1="8" y1="18" x2="21" y2="18"></line>
                        <line x1="3" y1="6" x2="3.01" y2="6"></line>
                        <line x1="3" y1="12" x2="3.01" y2="12"></line>
                        <line x1="3" y1="18" x2="3.01" y2="18"></line>
                    </svg>
                    All Leads
                </button>
                <button class="nav-item action-btn" data-view="new-lead">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Report Lead
                </button>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">

            <!-- Dashboard View -->
            <section id="view-dashboard" class="view-section active">
                <div class="header-flex" style="margin-bottom: 1rem;">
                    <h1 class="view-title">Overview</h1>
                    <button class="refresh-btn" onclick="fetchLeads()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                    </button>
                </div>

                <!-- Dashboard Filter Bar -->
                <div class="filter-bar glass-panel" style="justify-content: flex-start; margin-bottom: 1.5rem;">
                    <div class="filter-group">
                        <label for="filter-month">Select Month</label>
                        <select id="filter-month" class="status-updater" style="width: auto; padding: 0.5rem; background: var(--bg-primary); border: 1px solid var(--border-light); border-radius: 6px; font-family: 'Roboto', sans-serif;">
                            <option value="all">All Months</option>
                            <!-- Options populated by JS -->
                        </select>
                    </div>
                    <div class="filter-group custom-select-wrapper">
                        <label>Select Agent(s)</label>
                        <div class="custom-select-header" id="agent-select-header">
                            <span id="agent-select-text">All Agents</span>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M6 9l6 6 6-6"/>
                            </svg>
                        </div>
                        <div class="custom-select-dropdown hidden" id="agent-select-dropdown">
                            <div class="custom-select-search-container">
                                <input type="text" id="agent-search-input" class="custom-select-search" placeholder="Search agents...">
                            </div>
                            <div class="custom-select-options" id="agent-options-container">
                                <!-- Checkbox options populated by JS -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Stat Cards -->
                <div class="dashboard-grid stat-cards-grid" style="margin-bottom: 2rem;">
                    <div class="stat-card glass-card">
                        <div class="stat-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="9" cy="7" r="4"></circle>
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 class="stat-value" id="stat-total-leads">0</h3>
                            <p class="stat-label">Total Leads</p>
                        </div>
                    </div>
                    
                    <div class="stat-card glass-card">
                        <div class="stat-icon" style="color: var(--status-new);">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                <polyline points="22 4 12 14.01 9 11.01"></polyline>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 class="stat-value" id="stat-new-registrations">0</h3>
                            <p class="stat-label">New Registrations</p>
                        </div>
                    </div>

                    <div class="stat-card glass-card">
                        <div class="stat-icon" style="color: var(--status-sold);">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="1" x2="12" y2="23"></line>
                                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 class="stat-value" id="stat-total-sold">0</h3>
                            <p class="stat-label">Total Sold</p>
                        </div>
                    </div>
                </div>

                <!-- Agent Leaderboard -->
                <div class="leaderboard-section glass-panel">
                    <h3 class="section-title" style="margin-bottom: 1.5rem; color: var(--color-primary); font-family: var(--font-heading);">Agent Leaderboard</h3>
                    <div class="leaderboard-list" id="leaderboard-container">
                        <!-- Leaderboard items injected via JS -->
                    </div>
                </div>
            </section>

            <!-- All Leads View -->
            <section id="view-all-leads" class="view-section hidden">
                <div class="header-flex" style="margin-bottom: 1rem;">
                    <h2 class="view-title">All Leads Directory</h2>
                    <button class="refresh-btn" onclick="fetchLeads()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                    </button>
                </div>

                <!-- Filter Bar -->
                <div class="filter-bar glass-panel">
                    <div class="filter-group">
                        <label for="filter-firstname">First Name</label>
                        <input type="text" id="filter-firstname" placeholder="Search first name...">
                    </div>
                    <div class="filter-group">
                        <label for="filter-lastname">Last Name</label>
                        <input type="text" id="filter-lastname" placeholder="Search last name...">
                    </div>
                    <div class="filter-group">
                        <label for="filter-agent">Reported By</label>
                        <input type="text" id="filter-agent" placeholder="Search agents...">
                    </div>
                    <div class="filter-group">
                        <label for="filter-date">Date</label>
                        <input type="text" id="filter-date" placeholder="Search date (e.g. Mar 2026)...">
                    </div>
                </div>

                <!-- Leads Table -->
                <div class="table-responsive glass-panel">
                    <table class="leads-table">
                        <thead>
                            <tr>
                                <th>Full Name</th>
                                <th>Last Name</th>
                                <th>Reported By</th>
                                <th>Report Date</th>
                                <th>Status</th>
                                <th>Comments</th>
                            </tr>
                        </thead>
                        <tbody id="all-leads-container">
                            <!-- Leads injected via JS -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- New Lead Form View -->
            <section id="view-new-lead" class="view-section hidden">
                <h2 class="view-title">Report New Lead</h2>
                <div class="form-container glass-panel">
                    <form id="lead-form">
                        <div class="input-group-row">
                            <div class="input-group">
                                <label for="first_name">First Name *</label>
                                <input type="text" id="first_name" required placeholder="Alexander">
                            </div>
                            <div class="input-group">
                                <label for="last_name">Last Name *</label>
                                <input type="text" id="last_name" required placeholder="Wright">
                            </div>
                        </div>

                        <div class="input-group-row">
                            <div class="input-group">
                                <label for="report_date">Report Date</label>
                                <input type="text" id="report_date" disabled value="Auto-populated">
                            </div>
                            <div class="input-group">
                                <label for="reported_by">Reported By *</label>
                                <input type="text" id="reported_by" required placeholder="Jane Doe">
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="comments">Notes / Comments</label>
                            <textarea id="comments" rows="3"
                                placeholder="Interested in the penthouse suites..."></textarea>
                        </div>

                        <button type="submit" class="submit-btn" id="submit-btn">
                            <span>Register Lead</span>
                            <div class="spinner hidden" id="submit-spinner"></div>
                        </button>
                    </form>
                </div>
            </section>

        </main>
    </div>

    <!-- Template for Dashboard Cards -->
    <template id="lead-card-template">
        <div class="glass-card lead-card">
            <div class="card-header">
                <h3 class="lead-name"></h3>
                <span class="status-badge"></span>
            </div>
            <div class="card-body">
                <div class="info-row">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <span class="lead-date"></span>
                </div>
                <div class="info-row">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span class="lead-agent"></span>
                </div>
                <p class="lead-comments"></p>
            </div>
            <div class="card-footer">
                <select class="status-updater">
                    <option value="New Registration">New Registration</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Schedule Showing">Schedule Showing</option>
                    <option value="Sold">Sold</option>
                    <option value="Lost">Lost</option>
                </select>
            </div>
        </div>
    </template>

    <!-- Template for All Leads Table Rows -->
    <template id="lead-row-template">
        <tr class="lead-row all-leads-card">
            <td class="lead-firstname"></td>
            <td class="lead-lastname"></td>
            <td class="lead-agent"></td>
            <td class="lead-date"></td>
            <td>
                <div class="status-badge" title="Status">New Registration</div>
                <select class="status-updater">
                    <option value="New Registration">New Registration</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Schedule Showing">Schedule Showing</option>
                    <option value="Sold">Sold</option>
                    <option value="Lost">Lost</option>
                </select>
            </td>
            <td class="lead-comments"></td>
    </template>

    <!-- Template for Leaderboard Items -->
    <template id="leaderboard-item-template">
        <div class="leaderboard-item">
            <div class="agent-rank"></div>
            <div class="agent-info">
                <h4 class="agent-name"></h4>
                <div class="agent-leads-count">
                    <span class="count-value"></span> leads
                </div>
            </div>
    </template>

    <script src="/static/js/app.js"></script>
</body>

</html>
